<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Future Earn Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at top,#0f172a,#020617);

min-height:100vh;

padding:20px;

color:#fff;

overflow-x:hidden;

}

/* Glow Background */

body::before,
body::after{

content:'';

position:fixed;

width:300px;
height:300px;

border-radius:50%;

filter:blur(90px);

opacity:.18;

z-index:-1;

animation:floatGlow 8s ease-in-out infinite alternate;

}

body::before{

background:#00d4ff;

top:-120px;
left:-120px;

}

body::after{

background:#ffcc00;

bottom:-120px;
right:-120px;

}

@keyframes floatGlow{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* Heading */

.heading{

text-align:center;

font-size:34px;

font-weight:700;

margin-bottom:30px;

color:#ffcc00;

text-shadow:
0 0 25px rgba(255,204,0,.35);

}

/* Top Winner */

.top-card{

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:35px;

border-radius:30px;

text-align:center;

margin-bottom:30px;

box-shadow:
0 20px 50px rgba(0,0,0,.35);

animation:floatCard 5s ease-in-out infinite;

}

@keyframes floatCard{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

}

.crown{

font-size:65px;

margin-bottom:15px;

animation:rotateGlow 5s linear infinite;

}

@keyframes rotateGlow{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.top-name{

font-size:28px;

font-weight:700;

margin-bottom:10px;

}

.top-income{

font-size:24px;

font-weight:700;

color:#00ff88;

}

/* Leaderboard */

#board{

display:flex;

flex-direction:column;

gap:18px;

}

/* Card */

.card{

display:flex;

justify-content:space-between;

align-items:center;

padding:22px;

border-radius:25px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

box-shadow:
0 18px 40px rgba(0,0,0,.35);

transition:.35s ease;

}

.card:hover{

transform:
translateY(-6px)
scale(1.02);

}

/* Left */

.left{

display:flex;

align-items:center;

gap:15px;

}

/* Rank */

.rank{

width:52px;
height:52px;

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

font-weight:700;

background:
linear-gradient(
135deg,
#ffcc00,
#f59e0b
);

color:#000;

box-shadow:
0 10px 25px rgba(255,204,0,.25);

}

/* Profile */

.profile{

width:55px;
height:55px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#111827;

font-size:22px;

}

/* Name */

.name{

font-size:17px;

font-weight:600;

}

.tag{

font-size:12px;

color:#38bdf8;

margin-top:4px;

}

/* Amount */

.amount{

font-size:20px;

font-weight:700;

color:#00ff88;

}

/* Mobile */

@media(max-width:700px){

.heading{

font-size:28px;

}

.top-name{

font-size:22px;

}

.top-income{

font-size:20px;

}

.card{

padding:18px;

}

.amount{

font-size:17px;

}

}

</style>
</head>

<body>

<div class="heading">
🏆 TOP 10 LEADERS
</div>

<!-- Top Winner -->

<div class="top-card">

<div class="crown">
👑
</div>

<div class="top-name" id="winnerName">
Loading...
</div>

<div class="top-income" id="winnerIncome">
₹0
</div>

</div>

<!-- Leaderboard -->

<div id="board"></div>

<script>

/* RANDOM NAMES */

const names = [

"Rahul Sharma",
"Amit Verma",
"Rohit Kumar",
"Vikash Singh",
"Aditya Raj",
"Sandeep Yadav",
"Aryan Gupta",
"Nitesh Patel",
"Kunal Mishra",
"Deepak Maurya",
"Ankit Raj",
"Ravi Patel",
"Prince Kumar",
"Shubham Singh",
"Arman Khan",
"Yash Gupta",
"Neeraj Kumar",
"Manish Rajput",
"Vivek Yadav",
"Akash Sharma"

];

/* USERS ARRAY */

let users = [];

/* GENERATE RANDOM USERS */

for(let i = 0; i < 10; i++){

let income =

Math.floor(
Math.random() * 9000
) + 4000;

users.push({

name:
names[
Math.floor(
Math.random() * names.length
)
],

income:income

});

}

/* SORT */

users.sort((a,b)=>
b.income - a.income
);

/* TOP WINNER */

document.getElementById(
"winnerName"
).innerText = users[0].name;

document.getElementById(
"winnerIncome"
).innerText =
"₹" + users[0].income.toLocaleString();

/* SHOW USERS */

const board =
document.getElementById("board");

users.forEach((user,index)=>{

board.innerHTML += `

<div class="card">

<div class="left">

<div class="rank">
#${index + 1}
</div>

<div class="profile">
👤
</div>

<div>

<div class="name">
${user.name}
</div>

<div class="tag">
Top Leader
</div>

</div>

</div>

<div class="amount">
₹${user.income.toLocaleString()}
</div>

</div>

`;

});

/* AUTO CHANGE DAILY */

const today =
new Date().getDate();

console.log(
"Leaderboard Updated Day:",
today
);

</script>

</body>
</html>
