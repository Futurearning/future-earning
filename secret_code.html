<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Earn | Secret Code Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{
    background: linear-gradient(135deg,#0f172a,#111827,#000);
    min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px;
    color: white; overflow-x: hidden;
}
.glass-card{
    background: rgba(255,255,255,0.04); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); padding: 35px 25px; border-radius: 28px;
    width: 100%; max-width: 420px; box-shadow: 0 15px 45px rgba(0,0,0,0.4); text-align: center;
}
.logo{ font-size: 30px; font-weight: 700; margin-bottom: 8px; color: #ffde59; }
.sub{ font-size:13px; color:#aaa; margin-bottom: 25px; }
.input-group{ margin-bottom: 18px; }
input{
    width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; 
    outline: none; font-size: 15px; text-align: center; font-weight: 500;
}
input:focus{ border-color:#ffde59; background: rgba(255,255,255,0.08); }
.btn-claim{
    width: 100%; padding: 15px; border: none; border-radius: 16px;
    background: linear-gradient(145deg,#ffde59,#ffd000); color: #111;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px;
}
.btn-back{
    width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    background: transparent; color: #aaa; font-size: 14px; font-weight: 500; 
    cursor: pointer; margin-top: 15px; transition: 0.3s;
}
.btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

/* CUSTOM POPUP DESIGN */
.custom-popup-overlay{
    position:fixed; top:0; left:0; width:100%; height:100%;
    display:flex; justify-content:center; align-items:center;
    background: rgba(0,0,0,0.7); backdrop-filter:blur(6px); z-index:99999; padding:15px;
}
.custom-popup{
    width:100%; max-width:320px; padding:30px 22px; border-radius:28px;
    background: linear-gradient(145deg,#111,#1f1f1f); border:2px solid #ffde59;
    text-align:center; animation:popupShow 0.35s ease;
}
.popup-icon{ font-size:62px; margin-bottom:12px; }
.popup-icon.success{ color:#00ff99; }
.popup-icon.error{ color:#ff4d6d; }
.custom-popup h3{ font-size:28px; color:#ffde59; margin-bottom:8px; }
.custom-popup p{ font-size:15px; line-height:22px; color:#fff; margin-bottom:22px; }
.custom-popup button{
    width:100%; padding:13px; border:none; border-radius:16px;
    background: linear-gradient(145deg,#ffde59,#ffd000); color:#111;
    font-size:15px; font-weight:700; cursor:pointer;
}
@keyframes popupShow{ 0%{ transform:scale(0.6); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
</style>
</head>
<body>

    <audio id="successAudio" src="10rs.mp3" preload="auto"></audio>
    

<div class="glass-card">
    <div class="logo">🕵️ CODE HUNT</div>
    <div class="sub">Enter the secret code to claim your dynamic reward balance!</div>

    <div class="input-group">
        <input type="text" id="secretCodeInput" placeholder="ENTER SECRET CODE HERE">
    </div>

    <button class="btn-claim" id="submitSecretCodeBtn">🎁 Claim Code Reward</button>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">⬅ Back to Dashboard</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, onSnapshot, getDoc, updateDoc, increment, arrayUnion, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
    authDomain: "future-earn-20129.firebaseapp.com",
    projectId: "future-earn-20129",
    storageBucket: "future-earn-20129.firebasestorage.app",
    messagingSenderId: "64268879881",
    appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUserData = null;

function showPopup(type, message){
    const popup = document.createElement("div");
    popup.className = "custom-popup-overlay";
    popup.innerHTML = `
        <div class="custom-popup">
            <div class="popup-icon ${type}">${type === "success" ? "✔" : "✖"}</div>
            <h3>${type === "success" ? "Success" : "Error"}</h3>
            <p>${message}</p>
            <button id="closePopupBtn">OK</button>
        </div>
    `;
    document.body.appendChild(popup);
    document.getElementById("closePopupBtn").onclick = () => { popup.remove(); };
}

onAuthStateChanged(auth, (user) => {
    if (user) {
        const userRef = doc(db, "users", user.uid);
        onSnapshot(userRef, (snap) => {
            if (snap.exists()) {
                currentUserData = snap.data();
            }
        });
    } else {
        window.location.href = "index.html";
    }
});

/* SUBMIT CODE LOGIC - FIXED WITH EXCLUSIVE SINGLE-USE LIMIT & SOUND EFFECTS */
document.getElementById("submitSecretCodeBtn").onclick = async () => {
    if (!currentUserData || !auth.currentUser) {
        showPopup("error", "User data loading, please wait a moment!");
        return;
    }

    const enteredCode = document.getElementById("secretCodeInput").value.trim().toUpperCase();
    const userRef = doc(db, "users", auth.currentUser.uid);

    if (!enteredCode) {
        showPopup("error", "Please enter a code first!");
        return;
    }

    const claimedCodes = currentUserData.claimedCodes || [];
    if (claimedCodes.includes(enteredCode)) {
        showPopup("error", "You have already claimed this secret code once!");
        return;
    }

    try {
        const codeRef = doc(db, "secret_codes", enteredCode);
        const codeSnap = await getDoc(codeRef);

        if (!codeSnap.exists()) {
            showPopup("error", "Invalid Secret Code! This code does not exist or expired.");
            return;
        }

        const codeData = codeSnap.data();

        // 🌟 GLOBAL CHECK: Agar code pehle hi kisi aur user ne use kar liya hai
        if (codeData.isUsed === true) {
            showPopup("error", "This Secret Code has already been claimed by another user! Better luck next time.");
            return;
        }

        const rewardAmount = Number(codeData.amount);
        if (isNaN(rewardAmount) || rewardAmount <= 0) {
            showPopup("error", "Invalid configuration error. Contact Support!");
            return;
        }

        // 🎵 MUSIC TRIGGER: Success popup se just pehle sound play hoga
        const audio = document.getElementById("successAudio");
        if (audio) {
            audio.currentTime = 0; // Sound ko reset karega zero par
            audio.play().catch(e => console.log("Audio play blocked until interaction."));
        }

        // 🌟 LOCK THE CODE IMMEDIATELY: Ab koi doosra user is code ko use nahi kar payega
        await updateDoc(codeRef, {
            isUsed: true,
            claimedBy: auth.currentUser.uid,
            claimedAt: Date.now()
        });

        // Wallet balance update block
        await updateDoc(userRef, {
            wallet: increment(rewardAmount),
            claimedCodes: arrayUnion(enteredCode)
        });

        // Transaction log database recording
        await addDoc(collection(db, "transactions"), {
            userId: auth.currentUser.uid,
            amount: rewardAmount,
            type: `Secret Code Claimed (${enteredCode})`,
            timestamp: Date.now()
        });

        showPopup("success", `🎉 Congratulations! ₹${rewardAmount} Added to Total Wallet.`);
        document.getElementById("secretCodeInput").value = "";

    } catch (e) {
        console.error(e);
        showPopup("error", "Failed to update your wallet balance. Check connection!");
    }
};

</script>
</body>
</html>
