<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning History | Future Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .header a { color: #ffde59; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .header h1 { font-size: 1.2rem; flex-grow: 1; text-align: center; color: #ffde59; }
        .txn-card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .txn-info h4 { font-size: 0.9rem; margin-bottom: 4px; color: #eee; }
        .txn-info p { font-size: 0.7rem; color: #777; }
        .amount { font-weight: 600; font-size: 1rem; }
        .loading-text { text-align: center; padding: 50px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html">← Back</a>
        <h1>Earning History</h1>
    </div>

    <div id="txn-list">
        <p class="loading-text">Checking session...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
      authDomain: "future-earn-20129.firebaseapp.com",
      projectId: "future-earn-20129",
      storageBucket: "future-earn-20129.firebasestorage.app",
      messagingSenderId: "64268879881",
      appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const list = document.getElementById('txn-list');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadHistory(user.uid);
        } else {
            list.innerHTML = "<p style='text-align:center; padding:50px; color:#ff4444;'>Session Expired. Please Login Again.</p>";
        }
    });

    function loadHistory(uid) {
        // Yahan se orderBy hata diya hai taaki INDEX ki zaroorat na pade
        const q = query(
            collection(db, "transactions"), 
            where("userId", "==", uid)
        );

        onSnapshot(q, (snap) => {
            if (snap.empty) {
                list.innerHTML = "<p style='text-align:center; padding:40px; color:#555;'>No transactions found yet.</p>";
                return;
            }

            list.innerHTML = "";
            snap.forEach((doc) => {
                const txn = doc.data();
                const typeLower = txn.type.toLowerCase();
                const isDebit = typeLower.includes("withdraw") || txn.amount < 0;
                const color = isDebit ? "#ff4444" : "#28a745";
                const sign = isDebit ? "" : "+";

                list.innerHTML += `
                    <div class="txn-card" style="border-left: 4px solid ${color};">
                        <div class="txn-info">
                            <h4>${txn.type}</h4>
                            <p>${txn.timestamp ? new Date(txn.timestamp).toLocaleString() : 'Processing...'}</p>
                        </div>
                        <div class="amount" style="color: ${color}">${sign} ₹${Math.abs(txn.amount)}</div>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Error:", error);
            list.innerHTML = "<p style='text-align:center; padding:20px; color:red;'>Error loading data. Check internet.</p>";
        });
    }
</script>

</body>
</html>
