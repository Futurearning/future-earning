<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Future Earn | Join Now
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{

margin:0;
padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:
linear-gradient(
135deg,
#141e30,
#243b55,
#0f172a
);

height:100vh;

display:flex;

justify-content:center;
align-items:center;

overflow:hidden;

padding:15px;

position:relative;

}

/* ========================= */
/* GLOW EFFECT */
/* ========================= */

body::before{

content:'';

position:absolute;

width:350px;
height:350px;

background:#ffde59;

border-radius:50%;

top:-120px;
left:-100px;

filter:blur(130px);

opacity:0.35;

animation:float1 6s infinite alternate;

}

body::after{

content:'';

position:absolute;

width:320px;
height:320px;

background:#00d4ff;

border-radius:50%;

bottom:-120px;
right:-100px;

filter:blur(130px);

opacity:0.35;

animation:float2 7s infinite alternate;

}

@keyframes float1{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

@keyframes float2{

from{
transform:translateY(0px);
}

to{
transform:translateY(-40px);
}

}

/* ========================= */
/* CARD */
/* ========================= */

.glass-card{

position:relative;

background:
rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.15);

padding:38px 30px;

border-radius:32px;

width:100%;
max-width:420px;

box-shadow:
0 15px 45px rgba(0,0,0,0.35),
0 0 30px rgba(255,222,89,0.18);

color:white;

text-align:center;

animation:popup 0.6s ease;

z-index:10;

}

/* ========================= */
/* LOGO */
/* ========================= */

.logo{

font-size:42px;

font-weight:800;

background:
linear-gradient(
90deg,
#ffde59,
#ffffff,
#00d4ff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

text-shadow:
0 0 15px rgba(255,255,255,.3);

}

/* ========================= */
/* SUBTEXT */
/* ========================= */

.sub{

font-size:14px;

opacity:0.85;

margin-bottom:28px;

color:#e2e8f0;

}

/* ========================= */
/* INPUT */
/* ========================= */

.input-group{

margin-bottom:18px;

position:relative;

}

input,
select{

width:100%;

padding:15px 16px;

background:
rgba(255,255,255,0.08);

border:
1px solid rgba(255,255,255,0.2);

border-radius:16px;

color:white;

outline:none;

font-size:15px;

transition:0.3s;

}

input::placeholder{

color:
rgba(255,255,255,0.6);

}

input:focus,
select:focus{

border-color:#ffde59;

background:
rgba(255,255,255,0.14);

box-shadow:
0 0 15px rgba(255,222,89,0.25);

}

select option{

background:#111827;

color:white;

}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn-register{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:
linear-gradient(
145deg,
#ffde59,
#ffd000
);

color:#111827;

font-size:16px;

font-weight:800;

cursor:pointer;

margin-top:10px;

transition:0.3s;

box-shadow:
0 8px 0 #caa400,
0 15px 25px rgba(255,222,89,0.3);

}

.btn-register:hover{

transform:
translateY(-3px)
scale(1.02);

}

.btn-register:active{

transform:
translateY(3px);

box-shadow:
0 3px 0 #caa400;

}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer-text{

margin-top:22px;

font-size:14px;

color:#cbd5e1;

}

.footer-text a{

color:#ffde59;

text-decoration:none;

font-weight:700;

cursor:pointer;

}

/* ========================= */
/* POPUP */
/* ========================= */

.popup-overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.7);

backdrop-filter:blur(6px);

display:none;

justify-content:center;
align-items:center;

z-index:9999;

}

.popup{

width:290px;

background:
linear-gradient(
145deg,
#111827,
#1f2937
);

border-radius:28px;

padding:30px 22px;

text-align:center;

border:
2px solid #ffde59;

box-shadow:
0 0 25px rgba(255,222,89,.35);

animation:popupScale 0.4s ease;

}

.popup-icon{

font-size:60px;

margin-bottom:12px;

}

.success{

color:#00ff99;

text-shadow:
0 0 10px #00ff99;

}

.error{

color:#ff4d6d;

text-shadow:
0 0 10px #ff4d6d;

}

.popup h3{

color:#ffde59;

font-size:28px;

margin-bottom:10px;

}

.popup p{

font-size:15px;

line-height:1.7;

margin-bottom:20px;

color:white;

}

.popup button{

padding:12px 30px;

border:none;

border-radius:14px;

background:#ffde59;

color:#111;

font-weight:700;

cursor:pointer;

}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes popup{

0%{

transform:scale(.7);

opacity:0;

}

100%{

transform:scale(1);

opacity:1;

}

}

@keyframes popupScale{

0%{

transform:scale(.5);

opacity:0;

}

100%{

transform:scale(1);

opacity:1;

}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:500px){

.glass-card{

padding:30px 22px;

}

.logo{

font-size:34px;

}

}

</style>

</head>

<body>

<!-- ========================= -->
<!-- REGISTER CARD -->
<!-- ========================= -->

<div class="glass-card">

<div class="logo">
FUTURE EARN
</div>

<div class="sub">
Start your financial journey with us.
</div>

<!-- NAME -->

<div class="input-group">

<input
type="text"
id="fullName"
placeholder="Enter Full Name">

</div>

<!-- EMAIL -->

<div class="input-group">

<input
type="email"
id="email"
placeholder="Email Address">

</div>

<!-- PASSWORD -->

<div class="input-group">

<input
type="password"
id="password"
placeholder="Create Password">

</div>

<!-- REFERRAL -->

<div class="input-group">

<input
type="text"
id="referBy"
placeholder="Referral ID (e.g. FE1001)">

</div>

<!-- POSITION -->

<div class="input-group">

<select id="position">

<option value="left">

Join Left Side

</option>

<option value="right">

Join Right Side

</option>

</select>

</div>

<!-- BUTTON -->

<button
class="btn-register"
id="signupBtn">

Register & Activate

</button>

<!-- LOGIN -->

<div class="footer-text">

Already have an account?

<a href="#"
onclick="goLogin()">

Login

</a>

</div>

</div>

<!-- ========================= -->
<!-- POPUP -->
<!-- ========================= -->

<div class="popup-overlay"
id="popupOverlay">

<div class="popup">

<div class="popup-icon"
id="popupIcon">

✔

</div>

<h3 id="popupTitle">

Success

</h3>

<p id="popupMessage">

Account Created

</p>

<button onclick="closePopup()">

OK

</button>

</div>

</div>

<!-- ========================= -->
<!-- SOUND -->
<!-- ========================= -->

<audio id="successSound">

<source
src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
type="audio/mpeg">

</audio>

<audio id="errorSound">

<source
src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
type="audio/mpeg">

</audio>

<!-- ========================= -->
<!-- FIREBASE -->
<!-- ========================= -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {

getFirestore,
doc,
setDoc,
getDocs,
collection,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ========================= */
/* FIREBASE CONFIG */
/* ========================= */

const firebaseConfig = {

apiKey:
"AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",

authDomain:
"future-earn-20129.firebaseapp.com",

projectId:
"future-earn-20129",

storageBucket:
"future-earn-20129.firebasestorage.app",

messagingSenderId:
"64268879881",

appId:
"1:64268879881:web:07f81b5a0c82b9fce7d0d8"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

/* ========================= */
/* POPUP */
/* ========================= */

window.showPopup = function(type,message){

const overlay =
document.getElementById(
"popupOverlay"
);

const icon =
document.getElementById(
"popupIcon"
);

const title =
document.getElementById(
"popupTitle"
);

const msg =
document.getElementById(
"popupMessage"
);

overlay.style.display =
"flex";

msg.innerText =
message;

if(type === "success"){

icon.innerHTML = "✔";

icon.className =
"popup-icon success";

title.innerText =
"Success";

document.getElementById(
"successSound"
).play();

}else{

icon.innerHTML = "✖";

icon.className =
"popup-icon error";

title.innerText =
"Error";

document.getElementById(
"errorSound"
).play();

}

}

/* ========================= */
/* CLOSE POPUP */
/* ========================= */

window.closePopup = function(){

document.getElementById(
"popupOverlay"
).style.display = "none";

}

/* ========================= */
/* LOGIN FIX */
/* ========================= */

window.goLogin = function(){

window.open(
"index.html",
"_self"
);

}

/* ========================= */
/* REGISTER */
/* ========================= */

document.getElementById(
"signupBtn"
).onclick = async () => {

const name =
document.getElementById(
"fullName"
).value;

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

const referBy =
document.getElementById(
"referBy"
).value;

const position =
document.getElementById(
"position"
).value;

/* CHECK */

if(
!name ||
!email ||
!password ||
!referBy
){

showPopup(
"error",
"Please fill all fields!"
);

return;

}

try{

/* CHECK REFERRAL */

const q = query(

collection(db,"users"),

where(
"referralCode",
"==",
referBy
)

);

const querySnapshot =
await getDocs(q);

if(
querySnapshot.empty &&
referBy !== "ADMIN"
){

showPopup(
"error",
"Invalid Referral ID!"
);

return;

}

/* CREATE ACCOUNT */

const userCredential =

await createUserWithEmailAndPassword(

auth,
email,
password

);

const user =
userCredential.user;

/* CREATE REF CODE */

const myCode =

"FE" +

Math.floor(
1000 + Math.random() * 9000
);

/* SAVE FIRESTORE */

await setDoc(

doc(db,"users",user.uid),

{

uid:user.uid,

fullName:name,

email:email,

referralCode:myCode,

referBy:referBy,

position:position,

status:"pending",

wallet:0,

leftCount:0,

rightCount:0,

pairsMatched:0,

createdAt:
new Date().toISOString()

}

);

/* SUCCESS */

showPopup(

"success",

"Account Created! Your Code: " + myCode

);

/* REDIRECT */

setTimeout(()=>{

window.open(
"index.html",
"_self"
);

},2500);

}

catch(error){

showPopup(
"error",
error.message
);

}

};

</script>

</body>
</html>
