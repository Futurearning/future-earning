<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Earn | Join Now</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(135deg,#141e30,#243b55);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
padding:15px;
}

/* ========================= */
/* BACKGROUND GLOW */
/* ========================= */

body::before{

content:'';

position:absolute;

width:300px;
height:300px;

background:#ffde59;

border-radius:50%;

top:-120px;
left:-100px;

filter:blur(120px);

opacity:0.4;
}

body::after{

content:'';

position:absolute;

width:280px;
height:280px;

background:#ff4d6d;

border-radius:50%;

bottom:-120px;
right:-80px;

filter:blur(120px);

opacity:0.4;
}

/* ========================= */
/* CARD */
/* ========================= */

.glass-card{

position:relative;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.15);

padding:35px 28px;

border-radius:28px;

width:100%;
max-width:400px;

box-shadow:
0 10px 40px rgba(0,0,0,0.35),
0 0 30px rgba(255,222,89,0.2);

color:white;

text-align:center;

animation:popup 0.6s ease;
}

.glass-card h2{

font-size:34px;
font-weight:700;

color:#ffde59;

text-shadow:
0 0 10px rgba(255,222,89,0.7);

margin-bottom:8px;
}

.glass-card p{

font-size:14px;

opacity:0.8;

margin-bottom:25px;
}

/* ========================= */
/* INPUT */
/* ========================= */

.input-group{

margin-bottom:16px;
position:relative;
}

input,
select{

width:100%;

padding:14px 15px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.2);

border-radius:14px;

color:white;

outline:none;

font-size:15px;

transition:0.3s;
}

input::placeholder{

color:rgba(255,255,255,0.6);
}

input:focus,
select:focus{

border-color:#ffde59;

background:rgba(255,255,255,0.15);

box-shadow:
0 0 10px rgba(255,222,89,0.3);
}

select option{

background:#1d2671;
color:white;
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn-register{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:
linear-gradient(145deg,#ffde59,#ffd000);

color:#1d2671;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-top:10px;

transition:0.3s;

box-shadow:
0 6px 0 #caa400,
0 10px 20px rgba(255,222,89,0.3);
}

.btn-register:hover{

transform:translateY(-3px);
}

.btn-register:active{

transform:translateY(3px);

box-shadow:
0 2px 0 #caa400;
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer-text{

margin-top:20px;

font-size:13px;
}

.footer-text a{

color:#ffde59;

text-decoration:none;

font-weight:600;
}

/* ========================= */
/* POPUP */
/* ========================= */

.popup-overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.65);

backdrop-filter:blur(5px);

display:none;

justify-content:center;
align-items:center;

z-index:9999;

animation:fadeIn 0.3s ease;
}

.popup{

width:280px;

background:
linear-gradient(145deg,#111,#1e1e1e);

border-radius:25px;

padding:30px 20px;

text-align:center;

border:2px solid #ffde59;

box-shadow:
0 0 20px rgba(255,222,89,0.4),
0 0 40px rgba(255,222,89,0.2);

animation:popupScale 0.4s ease;
}

.popup-icon{

font-size:60px;
margin-bottom:10px;
}

.success{

color:#00ff99;

text-shadow:
0 0 10px #00ff99;
}

.error{

color:#ff4d6d;

text-shadow:
0 0 10px #ff4d6d;
}

.popup h3{

color:#ffde59;

font-size:26px;

margin-bottom:10px;
}

.popup p{

color:white;

font-size:15px;

margin-bottom:20px;
}

.popup button{

padding:12px 28px;

border:none;

border-radius:12px;

background:#ffde59;

color:#111;

font-weight:700;

cursor:pointer;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes popup{

0%{
transform:scale(0.7);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}
}

@keyframes popupScale{

0%{
transform:scale(0.5);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}
}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}
}

</style>
</head>
<body>

<div class="glass-card">

<h2>FUTURE EARN</h2>

<p>Start your financial journey with us.</p>

<div class="input-group">
<input type="text" id="fullName" placeholder="Enter Full Name">
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Create Password">
</div>

<div class="input-group">
<input type="text" id="referBy" placeholder="Referral ID (e.g. FE1001)">
</div>

<div class="input-group">

<select id="position">

<option value="left">Join Left Side</option>

<option value="right">Join Right Side</option>

</select>

</div>

<button class="btn-register" id="signupBtn">

Register & Activate

</button>

<div class="footer-text">

Already have an account ?
<a href="index.html">Login</a>

</div>

</div>

<!-- ========================= -->
<!-- POPUP -->
<!-- ========================= -->

<div class="popup-overlay" id="popupOverlay">

<div class="popup">

<div class="popup-icon" id="popupIcon">

✔

</div>

<h3 id="popupTitle">

Success

</h3>

<p id="popupMessage">

Account Created

</p>

<button onclick="closePopup()">

OK

</button>

</div>

</div>

<!-- ========================= -->
<!-- SOUND -->
<!-- ========================= -->

<audio id="successSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<audio id="errorSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg">
</audio>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDocs,
collection,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ========================= */
/* FIREBASE */
/* ========================= */

const firebaseConfig = {

apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",

authDomain: "future-earn-20129.firebaseapp.com",

projectId: "future-earn-20129",

storageBucket: "future-earn-20129.firebasestorage.app",

messagingSenderId: "64268879881",

appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* ========================= */
/* POPUP FUNCTION */
/* ========================= */

window.showPopup = function(type,message){

const overlay =
document.getElementById("popupOverlay");

const icon =
document.getElementById("popupIcon");

const title =
document.getElementById("popupTitle");

const msg =
document.getElementById("popupMessage");

overlay.style.display = "flex";

msg.innerText = message;

if(type === "success"){

icon.innerHTML = "✔";
icon.className = "popup-icon success";

title.innerText = "Success";

document.getElementById(
"successSound"
).play();

}else{

icon.innerHTML = "✖";
icon.className = "popup-icon error";

title.innerText = "Error";

document.getElementById(
"errorSound"
).play();
}
}

window.closePopup = function(){

document.getElementById(
"popupOverlay"
).style.display = "none";
}

/* ========================= */
/* REGISTER */
/* ========================= */

document.getElementById(
"signupBtn"
).onclick = async () => {

const name =
document.getElementById(
"fullName"
).value;

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

const referBy =
document.getElementById(
"referBy"
).value;

const position =
document.getElementById(
"position"
).value;

if(
!name ||
!email ||
!password ||
!referBy
){

showPopup(
"error",
"Please fill all fields!"
);

return;
}

try{

/* CHECK REFERRAL */

const q = query(
collection(db,"users"),
where("referralCode","==",referBy)
);

const querySnapshot =
await getDocs(q);

if(
querySnapshot.empty &&
referBy !== "ADMIN"
){

showPopup(
"error",
"Invalid Referral ID!"
);

return;
}

/* CREATE ACCOUNT */

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

/* REFERRAL CODE */

const myCode =
"FE" +
Math.floor(
1000 + Math.random() * 9000
);

/* SAVE DATA */

await setDoc(
doc(db,"users",user.uid),
{

uid:user.uid,

fullName:name,

email:email,

referralCode:myCode,

referBy:referBy,

position:position,

status:"pending",

wallet:0,

leftCount:0,

rightCount:0,

pairsMatched:0,

createdAt:new Date().toISOString()

}
);

showPopup(
"success",
"Account Created! Your Code: " + myCode
);

setTimeout(()=>{

window.location.href =
"index.html";

},2500);

}

catch(error){

showPopup(
"error",
error.message
);

}

};

</script>

</body>
</html>
