<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tree | Future Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { 
        background: radial-gradient(circle at center, #0a0e14 0%, #000 100%); 
        color: #fff; overflow-x: auto; padding: 20px; 
    }
    
    .header-info { 
        position: fixed; top: 0; left: 0; width: 100%; 
        background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px);
        padding: 15px; z-index: 100; text-align: center; border-bottom: 1px solid #333; 
    }
    .header-info h2 { font-size: 1.1rem; color: #ffde59; text-shadow: 0 0 10px rgba(255, 222, 89, 0.5); }

    .tree-container { display: flex; flex-direction: column; align-items: center; min-width: 100%; padding-top: 100px; }
    
    /* Neon Glass Node */
    .node { 
        background: linear-gradient(145deg, #1a1a1a, #111);
        border: 1px solid #444; padding: 12px; border-radius: 15px; 
        text-align: center; width: 120px; position: relative; cursor: pointer; 
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
    }
    
    .node:hover { transform: scale(1.1) translateY(-5px); border-color: #ffde59; box-shadow: 0 0 20px rgba(255, 222, 89, 0.3); }
    
    /* Color coding for Active/Pending */
    .node.active { 
        border: 2px solid #00ff88; 
        box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2), 0 0 15px rgba(0, 255, 136, 0.2); 
    }
    .node.pending { 
        border: 2px solid #ff4444; 
        box-shadow: inset 0 0 10px rgba(255, 68, 68, 0.2), 0 0 15px rgba(255, 68, 68, 0.2); 
    }
    
    .node h4 { font-size: 0.85rem; color: #fff; margin-bottom: 3px; font-weight: 600; }
    .node p { font-size: 0.65rem; color: #aaa; font-family: monospace; }
    
    .status-tag {
        font-size: 0.6rem; font-weight: bold; text-transform: uppercase;
        padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 5px;
    }
    .active .status-tag { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
    .pending .status-tag { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

    .children { display: flex; justify-content: center; width: 100%; margin-top: 40px; position: relative; }
    
    /* Colorful Connecting Lines */
    .children::before {
        content: ''; position: absolute; top: -40px; left: 50%;
        width: 2px; height: 40px; 
        background: linear-gradient(to bottom, #444, #ffde59);
    }
    
    .node-wrapper { padding: 0 8px; display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
    
    .node-wrapper::after {
        content: ''; position: absolute; top: -20px; width: 100%; height: 2px; 
        background: #444; z-index: -1;
    }
    /* Fixing line for single child */
    .node-wrapper:only-child::after { display: none; }
    
    /* Back Button ki Fix Styling */
.header-info { 
    position: fixed; top: 0; left: 0; width: 100%; 
    background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(10px);
    padding: 15px; z-index: 1000; /* Z-index badha diya taaki hamesha upar rahe */
    text-align: center; border-bottom: 1px solid #333; 
    display: flex; align-items: center; justify-content: center; /* Center align ke liye */
}

.back-btn { 
    position: absolute; left: 15px; 
    color: #ffde59; text-decoration: none; 
    font-size: 1.2rem; /* Size thoda bada kiya */
    font-weight: bold;
    padding: 5px 10px;
    border: 1px solid rgba(255, 222, 89, 0.3);
    border-radius: 8px;
    background: rgba(255, 222, 89, 0.05);
}

.back-btn:hover {
    background: rgba(255, 222, 89, 0.2);
}

</style>

</head>
<body>

    <div class="header-info">
    <a href="dashboard.html" class="back-btn">←</a>
    <h2>Network Explorer</h2>
</div>


    <div class="tree-container" id="treeView">
        <p>Loading your network...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
      authDomain: "future-earn-20129.firebaseapp.com",
      projectId: "future-earn-20129",
      storageBucket: "future-earn-20129.firebasestorage.app",
      messagingSenderId: "64268879881",
      appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) showDirectMembers(user.uid);
        else window.location.href = "index.html";
    });

    async function showDirectMembers(uid) {
        const treeContainer = document.getElementById('treeView');
        treeContainer.innerHTML = "<p style='color:#ffde59;'>Loading Network...</p>";
        
        const userSnap = await getDoc(doc(db, "users", uid));
        if (!userSnap.exists()) return;
        const myData = userSnap.data();

        const q = query(collection(db, "users"), where("referBy", "==", myData.referralCode));
        const querySnapshot = await getDocs(q);

        let leftList = "";
        let rightList = "";
        let activeNames = [];
        let inactiveNames = [];

        querySnapshot.forEach((member) => {
            const mData = member.data();
            const status = (mData.idStatus || mData.status || "pending").toLowerCase();
            const name = mData.fullName || "User";
            const statusColor = status === "active" ? "#00ff88" : "#ff4444";
            
            // Stats collect karna
            if(status === "active") activeNames.push(name);
            else inactiveNames.push(name);

            const memberHTML = `
                <div class="node" onclick="window.showDirectMembers('${member.id}')" style="margin-bottom:10px; cursor:pointer;">
                    <h4>${name}</h4>
                    <div class="status-tag" style="color: ${statusColor}; border: 1px solid ${statusColor}44;">
                        ${status.toUpperCase()}
                    </div>
                </div>
            `;

            if (mData.position === "left") leftList += memberHTML;
            else rightList += memberHTML;
        });

        // UI Layout with Stats Box
        treeContainer.innerHTML = `
            <div style="margin-bottom:20px;">
                <h2 style="color:#ffde59; font-size:1.2rem;">${myData.fullName}</h2>
                <button onclick="location.reload()" style="background:#222; color:#777; border:1px solid #333; padding:5px 15px; border-radius:8px; cursor:pointer; font-size:12px;">← Back to My Home</button>
            </div>

            <div style="background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-around; text-align: left;">
                <div>
                    <h4 style="color:#00ff88; font-size:12px;">ACTIVE (${activeNames.length})</h4>
                    <p style="font-size:10px; color:#aaa; max-width:120px;">${activeNames.join(", ") || "None"}</p>
                </div>
                <div style="border-left: 1px solid #222;"></div>
                <div>
                    <h4 style="color:#ff4444; font-size:12px;">INACTIVE (${inactiveNames.length})</h4>
                    <p style="font-size:10px; color:#aaa; max-width:120px;">${inactiveNames.join(", ") || "None"}</p>
                </div>
            </div>

            <div style="display: flex; gap: 15px; width: 100%;">
                <div style="flex: 1; background: rgba(0,212,255,0.02); padding: 10px; border-radius: 12px; border: 1px solid #111;">
                    <h3 style="color: #00d4ff; font-size: 11px; margin-bottom: 15px;">LEFT</h3>
                    ${leftList || "<p style='color:#333; font-size:10px;'>Empty</p>"}
                </div>
                <div style="flex: 1; background: rgba(255,165,0,0.02); padding: 10px; border-radius: 12px; border: 1px solid #111;">
                    <h3 style="color: #ffa500; font-size: 11px; margin-bottom: 15px;">RIGHT</h3>
                    ${rightList || "<p style='color:#333; font-size:10px;'>Empty</p>"}
                </div>
            </div>
        `;
    }

    window.showDirectMembers = showDirectMembers;
</script>


</body>
</html>
