<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tree | Future Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { 
        background: radial-gradient(circle at center, #0a0e14 0%, #000 100%); 
        color: #fff; overflow-x: auto; padding: 20px; 
    }
    
    .header-info { 
        position: fixed; top: 0; left: 0; width: 100%; 
        background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px);
        padding: 15px; z-index: 100; text-align: center; border-bottom: 1px solid #333; 
    }
    .header-info h2 { font-size: 1.1rem; color: #ffde59; text-shadow: 0 0 10px rgba(255, 222, 89, 0.5); }

    .tree-container { display: flex; flex-direction: column; align-items: center; min-width: 100%; padding-top: 100px; }
    
    /* Neon Glass Node */
    .node { 
        background: linear-gradient(145deg, #1a1a1a, #111);
        border: 1px solid #444; padding: 12px; border-radius: 15px; 
        text-align: center; width: 120px; position: relative; cursor: pointer; 
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
    }
    
    .node:hover { transform: scale(1.1) translateY(-5px); border-color: #ffde59; box-shadow: 0 0 20px rgba(255, 222, 89, 0.3); }
    
    /* Color coding for Active/Pending */
    .node.active { 
        border: 2px solid #00ff88; 
        box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.2), 0 0 15px rgba(0, 255, 136, 0.2); 
    }
    .node.pending { 
        border: 2px solid #ff4444; 
        box-shadow: inset 0 0 10px rgba(255, 68, 68, 0.2), 0 0 15px rgba(255, 68, 68, 0.2); 
    }
    
    .node h4 { font-size: 0.85rem; color: #fff; margin-bottom: 3px; font-weight: 600; }
    .node p { font-size: 0.65rem; color: #aaa; font-family: monospace; }
    
    .status-tag {
        font-size: 0.6rem; font-weight: bold; text-transform: uppercase;
        padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 5px;
    }
    .active .status-tag { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
    .pending .status-tag { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

    .children { display: flex; justify-content: center; width: 100%; margin-top: 40px; position: relative; }
    
    /* Colorful Connecting Lines */
    .children::before {
        content: ''; position: absolute; top: -40px; left: 50%;
        width: 2px; height: 40px; 
        background: linear-gradient(to bottom, #444, #ffde59);
    }
    
    .node-wrapper { padding: 0 8px; display: flex; flex-direction: column; align-items: center; position: relative; flex: 1; }
    
    .node-wrapper::after {
        content: ''; position: absolute; top: -20px; width: 100%; height: 2px; 
        background: #444; z-index: -1;
    }
    /* Fixing line for single child */
    .node-wrapper:only-child::after { display: none; }
    
    /* Back Button ki Fix Styling */
.header-info { 
    position: fixed; top: 0; left: 0; width: 100%; 
    background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(10px);
    padding: 15px; z-index: 1000; /* Z-index badha diya taaki hamesha upar rahe */
    text-align: center; border-bottom: 1px solid #333; 
    display: flex; align-items: center; justify-content: center; /* Center align ke liye */
}

.back-btn { 
    position: absolute; left: 15px; 
    color: #ffde59; text-decoration: none; 
    font-size: 1.2rem; /* Size thoda bada kiya */
    font-weight: bold;
    padding: 5px 10px;
    border: 1px solid rgba(255, 222, 89, 0.3);
    border-radius: 8px;
    background: rgba(255, 222, 89, 0.05);
}

.back-btn:hover {
    background: rgba(255, 222, 89, 0.2);
}

</style>

</head>
<body>

    <div class="header-info">
    <a href="dashboard.html" class="back-btn">←</a>
    <h2>Network Explorer</h2>
</div>


    <div class="tree-container" id="treeView">
        <p>Loading your network...</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
      authDomain: "future-earn-20129.firebaseapp.com",
      projectId: "future-earn-20129",
      storageBucket: "future-earn-20129.firebasestorage.app",
      messagingSenderId: "64268879881",
      appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            renderTree(user.uid);
        } else {
            window.location.href = "index.html";
        }
    });

    async function renderTree(uid) {
        const treeContainer = document.getElementById('treeView');
        treeContainer.innerHTML = await buildNodeHTML(uid);
    }

    async function buildNodeHTML(uid) {
        const userRef = doc(db, "users", uid);
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) return `<div class="node"><h4>Empty Slot</h4></div>`;
        
        const userData = userSnap.data();
        const statusClass = userData.status === 'active' ? 'active' : 'pending';

        // Find Left and Right children
        const qLeft = query(collection(db, "users"), where("referBy", "==", userData.referralCode), where("position", "==", "left"));
        const qRight = query(collection(db, "users"), where("referBy", "==", userData.referralCode), where("position", "==", "right"));
        
        const [leftSnap, rightSnap] = await Promise.all([getDocs(qLeft), getDocs(qRight)]);

        let html = `
            <div class="node-wrapper">
                <div class="node ${statusClass}" onclick="window.location.reload()">
                    <h4>${userData.fullName}</h4>
                    <p>${userData.referralCode}</p>
                    <p style="color:${userData.status === 'active' ? '#28a745' : '#ff4444'}">
                        ${userData.status.toUpperCase()}
                    </p>
                </div>
        `;

        if (!leftSnap.empty || !rightSnap.empty) {
            html += `<div class="children">`;
            
            // Left Child
            if (!leftSnap.empty) {
                html += await buildMiniNode(leftSnap.docs[0]);
            } else {
                html += `<div class="node-wrapper"><div class="node" style="opacity:0.3"><h4>No Left</h4></div></div>`;
            }

            // Right Child
            if (!rightSnap.empty) {
                html += await buildMiniNode(rightSnap.docs[0]);
            } else {
                html += `<div class="node-wrapper"><div class="node" style="opacity:0.3"><h4>No Right</h4></div></div>`;
            }

            html += `</div>`;
        }

        html += `</div>`;
        return html;
    }

    async function buildMiniNode(docSnap) {
        const data = docSnap.data();
        const id = docSnap.id;
        const statusClass = data.status === 'active' ? 'active' : 'pending';
        
        return `
            <div class="node-wrapper">
                <div class="node ${statusClass}" onclick="expandNode('${id}')">
                    <h4>${data.fullName}</h4>
                    <p>${data.referralCode}</p>
                    <p>${data.status}</p>
                </div>
            </div>
        `;
    }

    // Isse niche ka tree load hoga
    window.expandNode = (uid) => {
        renderTree(uid);
    };

</script>
</body>
</html>
