<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Future Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1d2671 0%, #c33764 100%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white; text-align: center;
        }
        h2 { margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px; color: white; outline: none;
        }
        .btn-login {
            width: 100%; padding: 12px;
            background: #ffde59; color: #1d2671;
            border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-login:hover { background: #f4cf33; transform: translateY(-2px); }
        .footer-text { margin-top: 20px; font-size: 0.8rem; }
        .footer-text a { color: #ffde59; text-decoration: none; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>WELCOME BACK</h2>
    <div class="input-group">
        <input type="email" id="loginEmail" placeholder="Email Address">
    </div>
    <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Password">
    </div>
    <button class="btn-login" id="loginBtn">Login Now</button>
    <div class="footer-text">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
        authDomain: "future-earn-20129.firebaseapp.com",
        projectId: "future-earn-20129",
        storageBucket: "future-earn-20129.firebasestorage.app",
        messagingSenderId: "64268879881",
        appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if(!email || !password) {
            alert("Email aur password dono bhariye!");
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Login Successful!");
            window.location.href = "dashboard.html"; // Login ke baad yahan jayega
        } catch (error) {
            alert("Login Failed: " + error.message);
        }
    };
</script>
</body>
</html>
