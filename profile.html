<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Future Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; }

        /* Sidebar Styling */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #111; transition: 0.4s; z-index: 1000; border-right: 1px solid #222; padding-top: 20px; }
        .sidebar.active { left: 0; }
        .nav-link { padding: 15px 20px; color: #ccc; text-decoration: none; display: flex; align-items: center; gap: 15px; border-radius: 8px; margin: 5px 10px; }
        .nav-link:hover { background: rgba(255, 222, 89, 0.1); color: #ffde59; }

        .menu-btn { position: fixed; top: 20px; left: 20px; background: #111; color: #ffde59; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 900; border: 1px solid #222; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* Profile Content */
        .container { max-width: 600px; margin: 80px auto 20px; padding: 20px; }
        .profile-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        .profile-img { width: 80px; height: 80px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: #ffde59; font-size: 2rem; border: 2px solid #ffde59; }
        
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .info-label { color: #888; }
        .info-value { color: #fff; font-weight: 600; }

        /* Password Form */
        .password-section { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; margin-top: 20px; }
        .password-section h3 { color: #ffde59; margin-bottom: 15px; font-size: 1.1rem; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #ffde59; }
        .update-btn { width: 100%; padding: 12px; background: #ffde59; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .update-btn:hover { background: #e6c64d; }
    </style>
</head>
<body>

    <div class="menu-btn" id="openMenu"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color:#ffde59; text-align:center; margin-bottom:20px;">FUTURE EARN</h2>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
        <a href="profile.html" class="nav-link" style="color:#ffde59;"><i class="fas fa-user"></i> My Profile</a>
        <a href="tree.html" class="nav-link"><i class="fas fa-sitemap"></i> Team Tree</a>
        <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-img"><i class="fas fa-user"></i></div>
            <h2 id="dispName">Loading...</h2>
            <p id="dispEmail" style="color:#888; font-size:0.8rem; margin-bottom:20px;">---</p>
            
            <div class="info-row"><span class="info-label">User ID:</span><span class="info-value" id="dispID">--</span></div>
            <div class="info-row"><span class="info-label">Sponsor:</span><span class="info-value" id="dispSponsor">--</span></div>
            <div class="info-row"><span class="info-label">Position:</span><span class="info-value" id="dispPos">--</span></div>
            <div class="info-row"><span class="info-label">Status:</span><span class="info-value" id="dispStatus" style="color:#ffde59;">--</span></div>
        </div>

        <div class="password-section">
            <h3>Update Password</h3>
            <input type="password" id="newPass" placeholder="Enter New Password">
            <input type="password" id="confirmPass" placeholder="Confirm New Password">
            <button class="update-btn" id="updatePassBtn">Update Password</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD3aPz3uVF7acGZlxsozwrxB61hWsjW784",
      authDomain: "future-earn-20129.firebaseapp.com",
      projectId: "future-earn-20129",
      storageBucket: "future-earn-20129.firebasestorage.app",
      messagingSenderId: "64268879881",
      appId: "1:64268879881:web:07f81b5a0c82b9fce7d0d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Sidebar Logic
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    document.getElementById('openMenu').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
    overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                const d = snap.data();
                document.getElementById('dispName').innerText = d.fullName;
                document.getElementById('dispEmail').innerText = d.email;
                document.getElementById('dispID').innerText = d.referralCode;
                document.getElementById('dispSponsor').innerText = d.referBy;
                document.getElementById('dispPos').innerText = d.position.toUpperCase();
                document.getElementById('dispStatus').innerText = d.status.toUpperCase();
            });
        } else { window.location.href = "index.html"; }
    });

    // Password Update Logic
    document.getElementById('updatePassBtn').onclick = async () => {
        const newP = document.getElementById('newPass').value;
        const confP = document.getElementById('confirmPass').value;

        if(newP.length < 6) { alert("Password kam se kam 6 characters ka hona chahiye!"); return; }
        if(newP !== confP) { alert("Password match nahi ho rahe!"); return; }

        try {
            await updatePassword(auth.currentUser, newP);
            alert("Success! Password update ho gaya hai.");
            document.getElementById('newPass').value = "";
            document.getElementById('confirmPass').value = "";
        } catch (e) {
            alert("Error: Suraksha ke liye aapko dubara login karna pad sakta hai.");
            console.error(e);
        }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);
</script>
</body>
</html>
